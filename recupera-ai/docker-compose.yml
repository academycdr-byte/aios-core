# RecuperaAI - Evolution API homolog (Feb 2026) with PostgreSQL + Redis
# Usage: docker compose up -d

services:
  evolution-db:
    image: postgres:16-alpine
    container_name: recupera-ai-evolution-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution_pass_2026
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution-redis:
    image: redis:7-alpine
    container_name: recupera-ai-evolution-redis
    restart: unless-stopped
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:homolog
    container_name: recupera-ai-evolution
    restart: unless-stopped
    depends_on:
      evolution-db:
        condition: service_healthy
      evolution-redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Server
      - SERVER_URL=http://localhost:8080
      - SERVER_PORT=8080

      # Authentication
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=recupera-ai-evo-key-2026
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # Logging
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS,WEBSOCKET
      - LOG_COLOR=true
      - LOG_BAILEYS=debug

      # CORS
      - CORS_ORIGIN=*

      # Database (PostgreSQL)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_pass_2026@evolution-db:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_recupera
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true

      # Redis Cache (required for Baileys session)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false

      # Webhook global → local dev (host.docker.internal reaches host from Docker)
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:3333/api/whatsapp/webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true

      # Instance cleanup
      - DEL_INSTANCE=false

      # WhatsApp settings
      - CONFIG_SESSION_PHONE_CLIENT=Chrome
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - QRCODE_LIMIT=30

      # Integrations (disabled)
      - CHATWOOT_ENABLED=false
      - TYPEBOT_ENABLED=false
      - OPENAI_ENABLED=false
      - DIFY_ENABLED=false

    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:
  evolution_db_data:
  evolution_redis_data:
