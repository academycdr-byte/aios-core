# RecuperaAI - Evolution API (WhatsApp)
# Usage: docker compose up -d
# Dashboard: http://localhost:8081/manager

services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: recupera-ai-evolution
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      # Server
      - SERVER_URL=http://localhost:8080
      - SERVER_PORT=8080

      # Authentication
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=recupera-ai-evo-key-2026

      # Logging
      - LOG_LEVEL=WARN
      - LOG_COLOR=true

      # CORS
      - CORS_ORIGIN=*

      # Database - disabled for simplicity (uses internal file storage)
      - DATABASE_ENABLED=false
      - DATABASE_SAVE_DATA_INSTANCE=false
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false

      # Cache - local only (no Redis needed)
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true

      # Webhook global (update after Vercel deploy)
      - WEBHOOK_GLOBAL_URL=
      - WEBHOOK_GLOBAL_ENABLED=false
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=false
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
      - WEBHOOK_EVENTS_CONTACTS_SET=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=false
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_SET=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_DELETE=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPDATE=false
      - WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE=false
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_CALL=false

      # Instance cleanup
      - DEL_INSTANCE=false

      # WhatsApp settings
      - CONFIG_SESSION_PHONE_CLIENT=RecuperaAI
      - CONFIG_SESSION_PHONE_NAME=Chrome

      # Chatwoot (disabled)
      - CHATWOOT_ENABLED=false

      # Typebot (disabled)
      - TYPEBOT_ENABLED=false

    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_instances:
