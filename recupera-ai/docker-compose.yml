# RecuperaAI - Evolution API v2 (WhatsApp)
# Usage: docker compose up -d
# Dashboard: http://localhost:8080/manager

services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: recupera-ai-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Server
      - SERVER_URL=http://localhost:8080
      - SERVER_PORT=8080

      # Authentication
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=recupera-ai-evo-key-2026

      # Logging
      - LOG_LEVEL=WARN
      - LOG_COLOR=true

      # CORS
      - CORS_ORIGIN=*

      # Database (internal SQLite - simple setup)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:evolution_pass@postgres:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true

      # Redis (for sessions)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=recupera-ai
      - CACHE_LOCAL_ENABLED=false

      # Webhook global (update after Vercel deploy)
      - WEBHOOK_GLOBAL_URL=
      - WEBHOOK_GLOBAL_ENABLED=false
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=false
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
      - WEBHOOK_EVENTS_CONTACTS_SET=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=false
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_SET=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_DELETE=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPDATE=false
      - WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE=false
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_CALL=false

      # Instance cleanup
      - DEL_INSTANCE=false

      # WhatsApp settings
      - CONFIG_SESSION_PHONE_CLIENT=RecuperaAI
      - CONFIG_SESSION_PHONE_NAME=Chrome

      # Chatwoot (disabled)
      - CHATWOOT_ENABLED=false

      # Typebot (disabled)
      - TYPEBOT_ENABLED=false

    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    container_name: recupera-ai-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: recupera-ai-postgres-evo
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=evolution_pass
      - POSTGRES_DB=evolution
    volumes:
      - postgres_evo_data:/var/lib/postgresql/data

volumes:
  evolution_instances:
  redis_data:
  postgres_evo_data:
