# =============================================================================
# PLANEJAMENTO ANUAL
# =============================================================================
planejamento:
  receita_duas_frentes:
    nome: "Receita de Aquisicao vs Receita de Retencao"
    erro_grave: "Olhar para receita de forma geral (receita captada) sem quebrar"
    passos:
      - "Receita de Aquisicao = novos clientes (primeira compra)"
      - "Receita de Retencao = clientes recorrentes (segunda, terceira, quarta compra em diante)"
      - "Calcular % de LTV (taxa de retencao) usando media dos ultimos 3 meses"
      - "Calcular quanto da receita precisa vir de cada frente"
    onde_buscar_dados: "Shopify, Nuvemshop (parte de analise), ou Google Analytics"

  planejamento_trimestral:
    passos:
      - "Dividir o ano em 4 trimestres (Q1, Q2, Q3, Q4)"
      - "Preencher janeiro usando a MEDIA dos ultimos 3 meses como base"
      - "Ajustar a media com base na realidade do mes atual (feeling + dados)"
      - "Preencher apenas as linhas em laranja (metricas de input)"
      - "Para cada mes subsequente, projetar com base em sazonalidades e fatores externos"
      - "Criar plano de acao por metrica para cada mes"
    ferramenta: "Planilha de Planejamento Anual"

  plano_acao_por_metrica:
    nome: "Metas sobre Metricas"
    conceito: "Para cada metrica do planejamento, criar acoes especificas para atingi-la"

    exemplo_retencao_16:
      acoes:
        - "Quantos disparos de WhatsApp API na semana?"
        - "Quantas mensagens na comunidade do WhatsApp?"
        - "Mini lancamento com cupom agressivo + escassez (ex: cupom R$20 off, apenas 10 unidades)"
        - "Quantos disparos de e-mail marketing? Que dia? Qual oferta?"

    exemplo_aprovacao_pagamento:
      acoes:
        - "Automacao de SMS apos PIX gerado (reforcar pagamento + codigo PIX)"
        - "Automacao de e-mail e WhatsApp padrao"

    exemplo_ticket_medio:
      acoes:
        - "Order bumps"
        - "Novos produtos"
        - "Kits/combos"
      regra: "Nao colocar metas fora da curva sem ter meios de atingi-las"

    exemplo_taxa_conversao:
      acoes:
        - "Quebrar em: adicao ao carrinho + conversao de checkout"
        - "Identificar qual etapa esta fraca e focar ajustes nela"

    exemplo_sessoes_organicas:
      acoes:
        - "Publicacoes no Instagram com automacao de MiniChat levando ao site"
        - "Publicacoes nos Stories com link"
        - "Sessoes vindas da comunidade de WhatsApp"

# =============================================================================
# GESTAO DE EQUIPE
# =============================================================================
equipe:
  principios:
    - "Treinar equipe do zero e preferivel a contratar especialista caro"
    - "Pessoa sem vicios de venda e mais barata e moldavel"
    - "Delegar != Largar (diferenca enorme)"
    - "Engrenagem deve rodar sem voce"
    - "Bonificar equipe: Nao tem como querer que equipe seja engajada se recebe R$800/mes"
    - "Carater > skill na contratacao"
    - "Nao fico bravo se errar. O que me deixa bravo e falta de compromisso, sinceridade, carater."

  delegacao_estruturada:
    passos:
      - "Contratar colaborador e treinar com seus conhecimentos"
      - "Pessoa do zero = melhor (sem vicios)"
      - "Compartilhar o Miro/estrategia com gestor/agencia"
      - "Delegar != Largar"
    objetivo: "Engrenagem deve rodar sem voce"

  sala_de_guerra:
    frequencia: "Sexta-feira"
    participantes: "Lideres de setor"
    regra: "Finjam que estao bebados, tirem todo filtro. Pode falar palavrao, ser direto."
    pergunta_obrigatoria: "O que pode quebrar nosso negocio hoje?"
    objetivo: "Desenvolver cabeca de dono nos colaboradores"

  clickup:
    uso: "Gestao completa (tarefas, squads, health score, formularios, automacoes)"
    health_score:
      entregou_antes: "10 pontos"
      no_dia: "7 pontos"
      atrasado: "3 pontos"
    pastas: "CSO (clientes), Design, WebDesign, Trafego, Reunioes, POPs, Plano de Carreira, RH"
    competicao: "Entre squads baseada em Health Score"
    formularios: "Clientes solicitam demandas (vai automaticamente pro responsavel)"

  comissao:
    base: "Resultado dos CLIENTES (taxa conversao, recuperacao carrinho, ROAS)"
    logica: "Equipe ganha quando cliente tem resultado"

  area_membros:
    uso: "Treinar equipe com videos de onboarding por funcao"

  cultura:
    ivan_quote_1: "A propria equipe expulsa quem nao gera resultado"
    ivan_quote_2: "Sejam um otimo vendedor de sonho (sobre gestao de pessoas)"
    ivan_quote_3: "Se o piloto do aviao comeca a chorar, voce desespera. Voces sao o piloto da empresa."
    ivan_quote_4: "Melhor do que mostrar faturamento e mostrar a vida das pessoas que trabalham com voce."
    ivan_quote_5: "O negocio e muito mais sobre pessoas do que o entregavel."

# =============================================================================
# BRANDING
# =============================================================================
branding:
  framework_objetivo_inimigo:
    nome: "Objetivo + Inimigo"
    objetivo_exemplo: "Democratizar o acesso a camisa de time"
    inimigo_exemplo: "Precos inacessiveis"
    comunicacao: "Voltada para publico que se identifica com esse posicionamento"
    humanizacao: "Em TUDO: feed, stories, banners, videos"
    ivan_quote: "Se voce conseguir entender e aplicar, vai fazer muita grana"

  instagram_como_vitrine:
    caminho_real_lead: "Anuncio -> Clica foto perfil -> Olha Instagram -> Bio ou segue -> Compra"
    feed: "Vitrine que converte (humanizado, nao pagina de futebol)"
    reels: "Para viralizar (atrair seguidores organicos)"
    marcados: "Influenciadores usando produto = mina de ouro"
    destaques: "Humanizar capas (foto cliente, nao icones genericos)"
    referencia_gringa: "ProDirect Soccer, FuteFanatics, e-commerces dos EUA"
    regra: "Cuidar para nao se parecer com pagina de futebol. Se parecer com LOJA."
    dado: "80% das vezes quem roda Face, a pessoa clica no perfil ANTES de ir pro site"

  humanizacao:
    principio: "Pessoas compram de pessoas. Nunca esteve tao forte como atualmente."
    elementos:
      - "Rosto na marca (influenciador ou colaborador)"
      - "Audio > texto"
      - "Video > imagem"
      - "Feed humanizado (nao pagina de futebol)"
      - "Pagina 'Quem Somos' com equipe real e espaco fisico"
      - "Fotos humanizadas com IA (modelos vestindo)"
      - "Avaliacoes com foto de clientes reais"
    pagina_quem_somos:
      referencia: "ShowMeme, Insider"
      incluir: "Equipe real, espaco fisico (ou mockup com IA), historia"
      diferencial: "Todo mundo tem 'estamos ha 5 anos no mercado' -> diferente e mostrar pessoas reais"
      mockup_ia: "Facade com IA e valido. Pessoas + espaco fisico = credibilidade maxima."

  facebook_organico:
    regra: "Configurar Instagram para publicar automaticamente no Facebook"
    dado: "12% das sessoes organicas vem do Facebook"
    acao: "Pagina do Facebook e Instagram devem estar alinhadas (mesma logo, mesmas informacoes)"

# =============================================================================
# COMMUNITY MANAGEMENT
# =============================================================================
comunidade:
  whatsapp:
    tres_tipos_mensagem:
      tipo_1_engajamento:
        exemplos:
          - "Enquetes em dia de jogo"
          - "Reacoes a lancamento de camisas"
          - "Noticias importantes do futebol (SO as importantes)"
        medicao: "60-70 reacoes em 10 min"

      tipo_2_elevar_consciencia:
        exemplos:
          - "UGC/GC de clientes recebendo produto"
          - "Videos de influenciadores"
        efeito: "Quebra 2 das 3 objecoes: qualidade + confianca"
        frequencia: "1 a cada 2 dias ou 1 por semana"

      tipo_3_oferta:
        exemplos:
          - "Cupom"
          - "Desconto progressivo"
          - "Parcelamento sem juros"
          - "Hack dia fraco: personalizacao gratuita"
        frequencia: "1x por semana ou 15/15 dias MAXIMO"
        regra: "Se so manda cupom, ninguem fica"

    resultados:
      black_friday: "R$12-15K em 30 minutos"
      percentual_faturamento: "10-15% do faturamento total"
      lancamento_com_contagem: "R$40K no dia"

    regra_fundamental: "Ninguem esta em grupo de WhatsApp pra receber cupom toda hora"

  manychat:
    uso: "Responda 'Timao' e ganha um presente"
    quando: "Em Stories pos-jogo (aproveitar calor da emocao)"
    metodologia: "Sexy Canvas + gatilho de curiosidade"

  notificacoes_app:
    modelo: "iFood"
    titulos: "CURIOSIDADE: 'Voce nunca viu isso daqui!' + emoji"
    regra: "NAO revelar oferta no titulo, apenas abaixo"
    exemplo: "Todos os produtos do Timao com 40% off somente ate as 23h59"
    rotacao: "Por clubes (sexta = Corinthians, sabado = Palmeiras, etc.)"

# =============================================================================
# 3 OBJECOES UNIVERSAIS
# =============================================================================
objecoes_universais:
  lista:
    - objecao: "Preco"
      contornos:
        - "Ancoragem de preco"
        - "Parcelas sem juros"
        - "Desconto progressivo"
        - "Comparacao com oficial (R$700 vs R$250)"
        - "Nivel de consciencia: mostrar 'cada camisa sai por R$94' ao inves de 'Pag2Leve3'"

    - objecao: "Qualidade do produto"
      contornos:
        - "UGC de clientes"
        - "VideoCommerce"
        - "Fotos detalhadas"
        - "Reviews com foto"
        - "Influenciadores usando"

    - objecao: "Confianca na loja"
      contornos:
        - "Humanizacao (rosto da marca)"
        - "Reviews de clientes"
        - "Reclame Aqui (nota 8.7+)"
        - "Pagina 'Quem Somos'"
        - "CNPJ, endereco, Google Maps"
        - "YouTube da marca"
        - "Instagram profissional"

  onde_quebrar:
    site: "Barra de anuncios, banners, pagina produto, checkout"
    comunidade: "Tipo 2 de mensagem (UGC/influenciadores)"
    x1: "Sequencia de 4 mensagens com contorno especifico"
    criativos: "UGC, fotos profissionais, videocommerce"

# =============================================================================
# 10 REGRAS UNIVERSAIS DE IVAN FURTADO
# =============================================================================
regras_universais:
  - numero: 1
    regra: "Facebook e teste eterno"
    detalhe: "Nunca parar de testar, nunca acreditar em formula magica"
    aulas: "01, 04, 06, 09, 10"

  - numero: 2
    regra: "80/20 sempre"
    detalhe: "80% no que funciona, 20% para testes"
    aulas: "06"

  - numero: 3
    regra: "Escala horizontal > vertical"
    detalhe: "Muitas campanhas trazendo resultado > 1 campanha que se morrer zera faturamento"
    aulas: "04, 09"

  - numero: 4
    regra: "Humanizacao acima de tudo"
    detalhe: "Pessoas compram de pessoas. Rosto > logo. Audio > texto. Video > imagem"
    aulas: "03, 07, 09, 10"

  - numero: 5
    regra: "Nichar e converter"
    detalhe: "Tudo nichado converte mais: publico, posicionamento, idade, clube, comunicacao"
    aulas: "03, 04, 05, 09, 10"

  - numero: 6
    regra: "Nao depender so de trafego"
    detalhe: "Comunidade, app, email, WhatsApp, afiliados = lucro sem custo de aquisicao"
    aulas: "02, 06, 09, 10"

  - numero: 7
    regra: "Base e o segredo do lucro"
    detalhe: "Trafego pago fica mais caro, base propria e o diferencial"
    aulas: "01, 02, 05, 06"

  - numero: 8
    regra: "Faturamento e ego, lucro e real"
    detalhe: "Sempre olhar margem, nao top line"
    aulas: "01, 02, 05, 06"

  - numero: 9
    regra: "Antecipacao e preparacao"
    detalhe: "Tudo pronto ANTES do evento. Quem prepara melhor, lucra mais"
    aulas: "08"

  - numero: 10
    regra: "Detalhes fazem diferenca"
    detalhe: "Fonte 2px maior, bordas consistentes, copy otimizada = taxa de conversao"
    aulas: "07, 10"

# =============================================================================
# HIERARQUIA DE PRIORIDADES DE TRAFEGO
# =============================================================================
hierarquia_trafego:
  etapas:
    - posicao: 1
      nome: "Coleta de Dados"
      objetivo: "Baratear metricas"
      estrutura: "1 campanha, 2 conjuntos (View Content R$7/dia + Add to Cart R$7/dia)"
      duracao: "7 dias (~R$80-100 total)"
      regra: "Primeira campanha que sobe e ULTIMA que mata"
      benchmarks:
        view_content: "< R$0.10 por acao"
        add_to_cart: "< R$1.00"
        cpm_antes: "R$22-25"
        cpm_apos: "R$8"

    - posicao: 2
      nome: "Catalogo Advantage+"
      objetivo: "Vendas sem esforco criativo"
      quando: "Apos 7 dias de coleta"
      resultado: "R$1.500 investido -> R$12.000 retorno (ROAS 7, CPA R$28)"
      cpas_clientes: "R$2-6.50 (excepcionais)"
      regra: "O pior inimigo no catalogo e a pressa. Catalogo precisa de tempo."
      evolucao:
        - "Campanha mae (todos os produtos, aberto)"
        - "Identificar clubes que vendem mais"
        - "Criar campanhas filiais nichadas por clube"
      otimiza_em: "14-15 dias"
      roas_esperado: "8-10"

    - posicao: 3
      nome: "Teste Criativo ABO"
      objetivo: "Validar criativos (variavel isolada)"
      estrutura: "1 campanha POR criativo, 3 conjuntos com MESMA segmentacao (so clube)"
      por_que_abo: "Controlar orcamento por conjunto, garantir gasto em todos os criativos"
      metricas_validacao: "CPA (principal), CPC, CTR, media de visualizacao"
      organizacao_trello:
        - "Coluna: Ideias de criativos"
        - "Coluna: Criativos em teste"
        - "Coluna: Criativos validados"
        - "Coluna: Criativos reprovados"
        - "Coluna: Criativos para segunda chance"

    - posicao: 4
      nome: "Teste Publico"
      objetivo: "Validar segmentacoes (variavel isolada)"
      estrutura: "1 campanha, 5+ conjuntos, CRIATIVO VALIDADO, segmentacoes diferentes"
      variaveis: "Genero, idade, regiao, interesse, comportamento, posicionamento, dispositivo"
      regra: "Pelo menos 1 conjunto com segmentacao fora da caixa"
      publicos_fora_caixa_validados:
        homem:
          - "Cerveja, churrasco, Brahma"
          - "Caze TV, TNT Sports, Sport TV"
          - "Funkzinho carioca (para publico do Rio)"
          - "Society/futebol amador"
          - "Influenciadores que o publico acompanha"
        mulher:
          - "Compradores envolvidos + compras na internet"
          - "Interesse no clube + interesse em Virginia + IPINC"
          - "Faixa 18-24, estado especifico, so Instagram"
      hack_feminino: "Adicionar 'compradores envolvidos em compras na internet' = CPA bizarro"

    - posicao: 5
      nome: "ABOMAX (Pre-Escala)"
      objetivo: "Escala com duplicacao em massa"
      estrutura: "1 campanha ABO, 5 conjuntos IGUAIS (publico validado + criativo validado)"
      execucao:
        - "Dos 5 conjuntos, manter os que vendem, matar os que nao"
        - "Duplicar os que vendem para 3, 5, 10 novos conjuntos"
        - "Repetir: vendeu -> duplicar; bateu CPA max -> matar"
        - "Olhar gerenciador CONSTANTEMENTE"
      rigor: "MUITO rigoroso com CPA. Com 60+ conjuntos nao precisa segurar CPA ruim."
      limite: "Ja dupliquei 90, 150 conjuntos"
      alerta: "NUNCA duplicar e dormir/sumir. Tem que monitorar."
      roas: "6-7 (gastando R$3-5k/dia)"

    - posicao: 6
      nome: "Advantage+ 1-1-1"
      objetivo: "Maxima inteligencia do Facebook"
      estrutura: "1 campanha, 1 conjunto, 1 criativo por campanha"
      regra: "So precisa validar CRIATIVO (Facebook escolhe publico)"
      caso: "Campanha ativa por 3 meses, orcamento R$100 a R$1.500/dia, ROAS 6, R$80k investidos"
      ivan_quote: "A campanha que mais vem funcionando hoje"
      regra_advantage: "NUNCA duplicar conjuntos (sobreposicao de leilao). Otimizar apenas orcamento."
      configuracao_publico:
        engajado: "Add to Cart 30d + View Content 30d + interacao catalogo 180d"
        clientes: "Compradores ultimos 90 dias"

    - posicao: 7
      nome: "CBO Semanal (Reciclagem)"
      objetivo: "Segunda chance para criativos/publicos"
      frequencia: "1 campanha CBO a cada 7-15 dias"
      conteudo: "5 melhores publicos + 3 criativos que QUASE validaram"

    - posicao: 8
      nome: "Remarketing"
      objetivo: "Converter publico que ja interagiu"
      tipo: "Sempre ABO (nunca CBO - CBO gastaria so no publico frio)"
      conjuntos:
        quente: "7 dias"
        morno: "14 dias (Ivan matou o de 15 dias)"
        frio: "30 dias"
        teste: "60-90 dias"
      tipos_criativo:
        - "UGC/Influenciador (manter mesma campanha, ir alimentando)"
        - "Catalogo"
        - "Imagem com desconto nichado (10% off Timao, cupom TIMAO10)"
      quando_comecar: "Minimo 300-500 compras, ou ~5000 add to cart, ~1000 checkout"
      se_cpm_alto: "Se CPM > R$100, ainda nao e momento"

    - posicao: 9
      nome: "Lookalike"
      objetivo: "Expandir para publicos similares"
      estrutura: "1 campanha, 10 conjuntos (cada um = uma % de semelhanca, 1-10%)"
      criativos: "APENAS validados do clube especifico"
      pre_requisito: "Gasto relevante, dados suficientes"
      resultado: "R$14K investido -> R$90K retorno em 1 dia (ROAS 6)"
      regra: "Publico no conjunto: APENAS o personalizado. Sem adicionar interesse do clube."

  regra_paralela: "NAO e tabua engessada. Se teste criativo esta vendendo, NAO pause. Rode em paralelo."
  ivan_quote: "Quando voce chegar na etapa de escala, provavelmente ja vai estar escalado"

# =============================================================================
# CRO (CONVERSION RATE OPTIMIZATION)
# =============================================================================
cro:
  diagnostico:
    passos:
      - "Calcular taxa de conversao geral: (vendas / sessoes) x 100"
      - "Se abaixo de 1%, quebrar em duas metricas:"
      - "Taxa de adicao ao carrinho (benchmark: 8%)"
      - "Taxa de conversao do checkout (benchmark: 18%+)"
    se_adicao_ruim: "Problema na pagina do produto"
    se_checkout_ruim: "Problema no checkout"

  simulacao_impacto:
    cenario_1: "10.132 sessoes, 54 compras = 0.53% conversao, R$23k receita, ROAS 4.6"
    cenario_2: "10.132 sessoes, 101 compras = 1% conversao, R$44k receita, ROAS 8.7"
    conclusao: "MESMO investimento em trafego (R$5k) -> quase DOBRO do ROAS"
    ivan_quote: "A gente fica muito bitolado no trafego e as vezes precisa olhar para o site"

  checklist_site:
    barra_anuncios:
      - "Ofertas que gerem desejo OU quebrem objecao"
      - "Escassez: 'Promocao valida somente esta semana'"
      - "Desejo: mostrar 'cada camisa sai por R$94' ao inves de 'Pag2Leve3'"
      - "Preco: desconto PIX, parcelamento"
      - "Autoridade: garantia, troca/devolucao"

    banners:
      - "MINIMO 3 banners, RENOVAR regularmente"
      - "Priorizar HUMANIZACAO (pessoas nos banners = 10 passos a frente)"
      - "Tipos: quebra objecao, desejo, oferta, sazonalidade, colecoes, escassez"
      - "Banner de influenciadores"
      - "Banner com nota Reclame Aqui (so se 8.7+)"
      - "Banner para colecoes mais vendidas (renovar mensalmente)"
      - "Banners para canais quentes (comunidade, app)"

    home:
      - "Seletor de colecoes/categorias (ref: Nike)"
      - "Produtos mais vendidos (atualizar semanalmente)"
      - "Produtos de lancamento"
      - "Produtos das principais categorias"
      - "Produtos com desconto (MAS NAO todos - 'se toda loja tem desconto, nada tem desconto')"
      - "VideoCommerce: video institucional 25-45 segundos"
      - "Social Commerce: elementos de redes sociais no site"
      - "Pop-up para coletar email/telefone (benchmark: 8%)"

    colecao:
      - "Banner exclusivo por colecao (identidade visual do clube)"
      - "Filtros: preco, disponibilidade, tamanho, categoria"
      - "Produtos com maior rotatividade NO TOPO"
      - "Ancoragem: 4o produto com preco alto sem desconto"
      - "Produto esgotado em 6o lugar (escassez + efeito manada)"
      - "Cadastrar produtos que fornecedor NAO tem como esgotados"
      - "VideoCommerce por colecao"

    pagina_produto:
      - "Foto, nome, avaliacoes (estrelas), preco comparativo + preco de venda"
      - "% de desconto, preco parcelado, desconto no PIX"
      - "Tabela de medidas, seletor variantes, personalizacao"
      - "ACIMA do botao: escassez ('quase esgotado', 'restam X unidades')"
      - "Variantes esgotadas (PP, 4XG - gera escassez)"
      - "Fotos humanizadas com IA (modelos vestindo)"
      - "Fotos detalhadas do produto"
      - "Foto explicando a oferta"
      - "Review do cliente com video"
      - "Calculadora de frete (AUMENTOU conversao do checkout)"
      - "Copy em texto E imagem"
      - "Linha suspensa: beneficios, prazo entrega, devolucao 7 dias"
      - "Produtos recomendados e vistos recentemente"
      - "Avaliacoes com fotos humanizadas por IA"
      - "CITAR nome da loja nas avaliacoes importadas"
      - "'Reviews' -> trocar para 'Avaliacoes' (publico pode nao saber ingles)"

    checkout:
      nao_fazer:
        - "NAO colocar banners/ofertas de desconto progressivo (leva cliente a sair)"
      fazer:
        - "Ofertas de PAGAMENTO (parcelamento, % off PIX, frete gratis)"
        - "Escassez ('ultimas unidades em promocao')"
        - "Identidade visual consistente com o site"
        - "Resumo do carrinho ABERTO por padrao"
        - "Mais de uma opcao de frete (frete gratis + frete expresso R$9.90-19.90)"
        - "Order bump por colecao"
        - "Avaliacoes no checkout (abaixo do rodape)"
      cartpanda: "Checkout com ate 35% de conversao (melhor que nativo Shopify)"
      frete_pago: "R$15k de lucro adicional no mes (caso R$1M faturamento)"

    rodape:
      - "Newsletter, redes sociais"
      - "Menu: colecoes, politicas, rastrear pedido, app, FAQ, historia, influenciadores"
      - "Pagina de avaliacoes de clientes"
      - "Central atendimento (canais, horarios, dias)"
      - "Barra inferior cinza com copyright + CNPJ"

    menu_cabecalho:
      - "Inicio, mais vendidos, principais categorias/colecoes"
