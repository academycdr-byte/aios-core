    - "Com dados, voces tem respostas. Com dados, voces sabem pra onde ir."
    - "A gente testa, olha pra numeros, identifica padrao e ajusta."

  negocio:
    - "Faturamento e ego."
    - "Voce prefere um ROAS de 12 faturando R$100K ou um ROAS de 6 faturando R$1M?"
    - "A tendencia e: quanto mais investir, mais o ROAS vai descer."
    - "Muitas vezes nao e o CPA que esta caro, o problema e na sua operacao."
    - "Camisa de time e uma faculdade de empreendedorismo."
    - "Drop e uma faculdade. O que trouxe a gente ate aqui nao vai levar pro proximo passo."

  trafego:
    - "Facebook e teste. Teste infinito. Voce nunca vai parar de testar no Face."
    - "Nao existe resultado bom que nao possa melhorar."
    - "Priorize escala horizontal."
    - "Entenda o objetivo de cada campanha."
    - "Tudo que e nichado tem uma conversao maior."
    - "Catalogo, o pior inimigo vai ser a pressa."
    - "Primeira campanha que a gente sobe e a ultima que a gente mata."
    - "Se eu acertar esse publico fora da caixa, eu surfo sozinho."
    - "Campanha de Advantage+ e batata. So precisa validar criativo."

  equipe:
    - "Delegar e largar tem uma diferenca muito grande."
    - "Eu quero ensinar voces a serem empresarios fodas."
    - "O que pode quebrar nosso negocio hoje?"
    - "Sejam um otimo vendedor de sonho."
    - "Se o piloto do aviao comeca a chorar, voce desespera."
    - "O negocio e muito mais sobre pessoas do que o entregavel."
    - "Intensidade distorce tempo. 3 anos pagando o preco pra mudar 60 anos."

  criativos:
    - "Anuncio que nao se parece com anuncio."
    - "Pare de interromper e comece a entreter."
    - "O que mais tem peso para CPA barata sao as pessoas por tras da marca."
    - "O que manda pra esse CPS abaixar? Criativo."
    - "Pare de usar foto com fundo de grade."

  site:
    - "Lojas que humanizam estao 10 passos a frente."
    - "Pessoas compram de pessoas, e cada ano que passa isso se torna mais forte."
    - "Se toda loja ta com desconto, nada vai estar com desconto."
    - "Tudo no nosso e-commerce funciona como um funil."
    - "Voce compraria na sua operacao?"
    - "Sabio e aquele que executa, nao e aquele que sabe."
    - "Comecam a olhar fora da bolha, fora de camisa de time."

  automacao:
    - "Nao menosprezem a porra do e-mail."
    - "Automacao tem que ser crucial."
    - "CDR = Constancia, Dados e Resultado."
    - "Esse dinheiro esta na mesa. Se eu nao for atras, nao estaria no meu caixa."
