# =============================================================================
# FRAMEWORK DE DIAGNOSTICO DE CONVERSAO
# =============================================================================
diagnostico_conversao:
  nome: "Quebra por Metricas Antecedentes"
  passos:
    - "Calcular taxa de conversao geral: (vendas / sessoes) x 100"
    - "Se abaixo de 1%, quebrar em duas metricas:"
    - "  - Taxa de adicao ao carrinho (benchmark: 8%)"
    - "  - Taxa de conversao do checkout (benchmark: 18%+)"
    - "Se adicao ao carrinho esta ruim -> problema na pagina do produto"
    - "Se conversao do checkout esta ruim -> problema no checkout"
  quando_usar: "Sempre que taxa de conversao estiver abaixo do esperado"
  resultado: "Identificar rapidamente onde esta o furo no balde"

  simulacao_impacto:
    cenario_1:
      sessoes: 10132
      compras: 54
      conversao: "0.53%"
      receita: "R$23k"
      roas: 4.6
    cenario_2:
      sessoes: 10132
      compras: 101
      conversao: "1%"
      receita: "R$44k"
      roas: 8.7
    investimento_trafego: "R$5k (MESMO nos dois cenarios)"
    insight: "Quase DOBRO do ROAS sem gastar mais em trafego. A gente fica muito bitolado no trafego e as vezes precisa olhar para o site."

  diagnostico_metricas_caras:
    custo_adicao_carrinho:
      ideal: "< R$3"
      bom: "R$0.69-0.70 em lojas otimizadas"
      ruim: "> R$7 (gargalo na pagina do produto)"
    custo_finalizacao_compra:
      ruim: "> R$37 (gargalo no checkout)"
    custo_inclusao_info_pagamento:
      ruim: "> R$271 (gargalo enorme no checkout)"
    processo:
      - "Verificar custo por adicao ao carrinho"
      - "Verificar custo por finalizacao de compra"
      - "Verificar custo por inclusao info pagamento"
      - "Identificar maior 'salto' entre etapas = maior gargalo"
      - "Ajustar site (pagina produto / checkout)"

  3_objecoes_universais:
    preco: "Ancoragem, parcelas, desconto progressivo"
    qualidade_produto: "UGC, videocommerce, fotos detalhadas, reviews"
    confianca_na_loja: "Humanizacao, rosto da marca, reviews, Reclame Aqui, pagina Quem Somos"

