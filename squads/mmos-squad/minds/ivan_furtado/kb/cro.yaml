# =============================================================================
# REGRAS DE DECISAO CRO
# =============================================================================
decision_rules:
  conversao:
    - regra: "Se taxa de adicao ao carrinho ruim mas checkout bom -> problema na pagina do produto"
    - regra: "Se checkout ruim mas adicao ao carrinho boa -> problema no checkout"
    - regra: "Se CPA de adicao ao carrinho > R$3 -> problema na pagina do produto"
    - regra: "Se custo finalizacao de compra > R$40 -> problema no checkout"
    - regra: "Se custo inclusao info pagamento > R$100 -> checkout com furo grave"
    - regra: "Se todas metricas caras -> (1) Ajustar site, (2) Verificar pixel, (3) Google Analytics, (4) Criar BM nova"

  email:
    - regra: "Tem trafego rodando? TEM QUE TER automacao ativa."
    - regra: "Nao menosprezem e-mail (enfatico)"
    - regra: "Comecar com email basico (V1) para evitar spam, migrar para V2 apos 2-3 meses"
    - regra: "PIX vencido -> oferecer desconto adicional (objecao principal e preco)"
    - regra: "Cartao recusado (antifraude) -> oferecer pagamento PIX"
    - regra: "Pedido pago -> upsell com 15-20% desconto"
    - regra: "Faturando R$100K+/mes -> Klaviyo para email + Reportana para WhatsApp"
    - regra: "Disparo WhatsApp Business: cai muito facil. 3-4 disparos cai. Usar API oficial."
    - regra: "Carrinho abandonado email de time brasileiro: usar imagem INTERNACIONAL"
    - regra: "Links no email: varios clubes -> COLECAO. Um clube -> PRODUTO."

  preco:
    - regra: "Se todos os produtos tem mesmo desconto -> URGENTE corrigir"
    - regra: "Ancoragem em produtos com BAIXA rotatividade (nao nos mais vendidos)"
    - regra: "Markup < 1.8x -> sinal de alerta, margem muito apertada"
    - regra: "Margem bruta < 15% -> chance alta de prejuizo"

  site:
    - regra: "Voce compraria na sua operacao? (autocritica essencial)"
    - regra: "Olhar fora da bolha, fora de camisa de time"
    - regra: "Eu tenho um perfil onde so aparece anuncio de concorrente - visito sites 3-5 vezes por semana"
    - regra: "Entre no funil reverso de grandes marcas: gere PIX na Nike, abandone carrinho na Adidas"

  recuperacao:
    - regra: "NUNCA usar ChatGPT para scripts de venda"
    - regra: "Cupom NAO na primeira mensagem"
    - regra: "Tempo de resposta < 20 minutos"
    - regra: "Lead quente = prioridade"
    - regra: "Constancia: 4 contatos minimo"
    - regra: "NUNCA excluir comentarios negativos no Facebook. Ocultar sim."
    - regra: "Comunidade so cupom NAO funciona. Precisa dos 3 tipos de mensagem."

  adicao_carrinho:
    - regra: "Adicao ao carrinho < 8% -> pagina do produto esta horrivel. Liga o alerta."

  dados:
    - regra: "Olhem para dados. Numeros falam com a gente."
    - regra: "Muitas vezes nao e o CPA que esta caro, nao e o problema nos anuncios, o problema e na sua operacao"
    - regra: "A gente testa, olha pra numeros, olha pra dados, identifica padrao e ajusta"

