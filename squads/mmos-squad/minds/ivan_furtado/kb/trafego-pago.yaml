# =============================================================================
# REGRAS DE DECISAO
# =============================================================================
decision_rules:
  trafego_geral:
    - regra: "Facebook e teste - destinar porcentagem do orcamento para testar SEMPRE"
    - regra: "Nunca dependa de uma unica campanha - escala horizontal"
    - regra: "Acertou a mao? Continue testando - nao existe resultado bom que nao possa melhorar"
    - regra: "Entenda o objetivo de cada campanha (coleta=dados, catalogo=CPA barato, escala=faturamento)"

  quando_matar_conjunto:
    - "Bateu CPA max sem vender -> matar (ser rigoroso em duplicacao)"
    - "ABOMAX com 60+ conjuntos -> nao precisa segurar CPA ruim -> corta"
    - "Escadinha: chegou em orcamento minimo e ainda ruim -> MATAR campanha"

  diagnostico_performance:
    - "Se campanha perde performance sem motivo: verificar (1) aumento expressivo de orcamento, (2) frequencia aumentou (publico saturou), (3) Facebook testando nova fatia de publico"
    - "Se criativo/oferta desatualizada -> pode ser causa de queda -> verificar precos e ofertas"
    - "Se CBO e novo anuncio nao gasta: tente subir novo conjunto -> se nao gastar -> crie nova campanha"
    - "Se ABO: voce consegue controlar orcamento por conjunto -> suba novo conjunto para teste"

  sazonalidades:
    - "Final de mes: CPA mais caro (normal para TODAS as lojas)"
    - "Comeco de mes: CPA mais barato -> testar mais criativos no inicio do mes"
    - "Final de campeonato: melhor momento para camisa de time"
    - "Janeiro: queda (principalmente se drop com feriado chines)"
    - "Fevereiro: pior mes (feriado chines = pausa de 15 dias); foco em retencao"
    - "Marco em diante: aumento gradual"
    - "Copa do Mundo: faturamento pode dobrar/triplicar"
    - "Pos-Copa: queda inevitavel, voltar ao baseline"
    - "Outubro: mes mais fraco (antecede Black Friday, consumidores esperam)"
    - "Novembro (Black Friday): pico"
    - "Dezembro: final de campeonatos, segundo pico"

  cps_alto:
    regra: "Problema esta nos CRIATIVOS, nao necessariamente no publico"
    quote: "O pessoal fala muito de publico errado... Voces normalmente clicam em anuncios que nao fazem sentido pra voce?"

  configuracoes_tecnicas:
    pixel: "Pixel no codigo do tema + App nativo: NAO ter os dois (duplicacao de metrica). Escolher um."
    app_nativo: "App nativo da Shopify (Facebook & Instagram): Melhor performance de catalogo; compartilhamento de dados no MAXIMO"
    comentarios: "OCULTAR comentarios negativos, nunca excluir. Excluir prejudica metricas do Facebook."

  clube_para_rodar: "Escolher o que esta em HYPE (Santos/Neymar, Corinthians/Paulistao, Mundial)"
  posicionamento: "Se gastou R$150 no Feed sem vendas e R$150 no Reels com 10 vendas -> REMOVER Feed"

# =============================================================================
# ESTRUTURA COMPLETA DE 8 ESTAGIOS (HOT SEAT 01)
# =============================================================================
estrutura_8_estagios:
  descricao: "Pipeline completo de trafego do inicio a escala, apresentado no Hot Seat 01"
  estagios:
    1_coleta_dados:
      campanhas: 1
      conjuntos: 2
      objetivo_conjunto_1: "View Content (R$7/dia)"
      objetivo_conjunto_2: "Add to Cart (R$7/dia)"
      catalogo: "TODOS os produtos"
      duracao: "7 dias (~R$80-100 total)"
      resultado: "Barateia CPM, custo por adicao ao carrinho, CPA"

    2_catalogo_advantage_plus:
      quando: "Apos 7 dias de coleta"
      estrutura: "Campanha Advantage+ com catalogo completo"
      tempo_otimizacao: "14-15 dias"
      roas_esperado: "8-10"
      nao_depende: "Validar criativo (foto do produto = catalogo)"

    3_teste_criativo_abo:
      estrutura: "1 campanha POR criativo, 3 conjuntos, MESMA segmentacao"
      metricas: "CPA (principal), CPC, CTR, media visualizacao"
      regra: "SEMPRE ABO (garantir gasto igual)"

    4_teste_publico:
      estrutura: "Criativo VALIDADO, 1 campanha, 5 conjuntos, segmentacoes DIFERENTES"
      variaveis: "Idade, estado, genero, detalhamento (interesses), comportamento"

    5_pre_escala_abomax:
      estrutura: "1 campanha ABO, 5 conjuntos IGUAIS (publico + criativo validados)"
      duplicacao: "De 5 para 15, 30, 60+ conjuntos"
      rigor: "CPA ideal -> ruim -> cortar imediatamente"

    6_cbo_semanal:
      estrutura: "1 campanha CBO a cada 7-15 dias"
      conteudo: "5 melhores publicos quase validados + 3 criativos quase validados"

    7_advantage_plus_1_1_1:
      descricao: "A campanha que mais vem funcionando hoje"
      estrutura: "1 campanha, 1 conjunto, 1 criativo"
      regra: "So precisa validar o CRIATIVO"
      cada_criativo_validado: "Nova campanha Advantage+"

    8_remarketing:
      quando_comecar: "300-500 compras ou 5000 add to cart + 1000 finalizacoes"
      tipo: "Sempre ABO"
      conjuntos: "Frio (30d), morno (14d), quente (7d)"
      se_cpm_maior_100: "Ainda nao e momento"

