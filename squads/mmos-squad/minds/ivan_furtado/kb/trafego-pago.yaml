  roas:
    medio_operacao_cdr: 7.7
    considerado_saudavel: "7.7+"
    catalogo_advantage_plus: "7-8"
    escala_lookalike: 6
    coleta_de_dados: "1.6 (normal e esperado)"
    campanha_advantage_plus_3_meses: 6
    abomax: "6-7"
    remarketing: "8 (semanas com 14-15)"
    roas_break_even: "~3.36 (para operacao com markup 2x e custos tipicos)"
    roas_para_margem_16_porcento: 7.6
    roas_para_margem_19_porcento: 10
    caso_alavancagem: "R$800/dia ROAS 55 -> R$4,800/dia ROAS 40 (so datas sazonais)"

  cpa:
    medio_mercado_inicio: "R$50-60"
    catalogo_baixo: "R$2-6.50"
    catalogo_medio: "R$28"
    campanha_escala: "R$50-80"
    remarketing_catalogo: "R$7 (3 compras) e R$18 (1 compra)"
    nichos_segmentados: "R$7-9 (vs R$15-25 com segmentacao ampla)"
    reducao_impacto: "CPA de R$50 = margem 16%; CPA de R$35 = margem 20% (4pp de diferenca)"

  cpm:
    antes_coleta: "R$22-25"
    apos_coleta: "R$8"
    geral_referencia: "~R$9"
    remarketing_ok: "similar ao geral"
    remarketing_ruim: ">R$90 (pouco publico ainda)"
    remarketing_nao_rodar: ">R$100"

  cps:
