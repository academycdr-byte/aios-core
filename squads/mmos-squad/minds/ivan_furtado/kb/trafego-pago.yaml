  ctr:
    criativo_botafogo_torcedor_chorando: "Acima de 10%"

  connect_rate:
    bom: "Acima de 80-90%"

  investimento:
    coleta_de_dados: "R$7/dia por conjunto (2 conjuntos = R$14/dia)"
    advantage_plus_inicial: "R$30-50/dia"

  conversao_trafego:
    compradores_homens_camisa_time: "98%"
