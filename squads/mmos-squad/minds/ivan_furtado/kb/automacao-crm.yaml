    tipos:
      - "Carrinho abandonado por clube (ex: produto contem Palmeiras)"
      - "Compradores por clube"
      - "Clientes dos ultimos 180 dias"
      - "Clientes que abriram e-mails"
      - "Clientes que ja receberam compras"
    criacao: "Automatica e retroativa (puxa historico da loja). Atualiza sozinha."
    uso: "Disparos nichados por clube + automacoes segmentadas"

  matriz_rfm:
    plataforma: "Reportana"
    escala: "0 a 10 baseado no potencial"
    nivel_8_10: "Comprou varias vezes, gastou muito -> muito mais facil converter"
    nivel_0_1_2: "Campanhas especificas para reativar"

  por_comportamento:
    eventos_facebook:
      - "Add to Cart 30 dias"
      - "View Content 30 dias"
      - "Interacao catalogo 180 dias"
      - "Compradores ultimos 90 dias"
    lista_compradores_180_dias:
      descricao: "Exportar lista da Shopify -> criar publico no Facebook"
      logica: "Tempo medio de recompra de camisa de time e 180 dias"

  teste_ab:
    plataforma: "Reportana"
    funcionalidade: "Funcao Randomizar - 50% leads para versao A, 50% para versao B"
    metricas:
      - "Conversao por Envio: receita gerada por cada envio"
      - "Conversao por Clique: receita gerada por cada clique"
    como_calcular: "Pegar dados da Reportana e jogar no ChatGPT: 'Quero calcular conversao por envio' + dados"

# =============================================================================
# WHATSAPP
# =============================================================================
whatsapp:
  recuperacao_x1:
    descricao: "Recuperacao 1-para-1 via WhatsApp"
    resultado: "~R$3M recuperados, ROAS ~10x"
    sequencia: "4 mensagens ao longo de 4 dias"
    tempo_resposta_maximo: "20 minutos"

  api_oficial:
    regra: "WhatsApp Business cai muito facil (3-4 disparos e cai). USAR API oficial."
    plataforma: "Reportana (API oficial integrada)"
    layout: "Video + copy + botao"
    disparos: "Segmentados por clube"
    resultado: "Absurdo a conversao"

  comunidade_whatsapp:
    tres_tipos_mensagem:
      tipo_1_engajamento:
        nome: "Engajamento e Interacao"
        exemplos:
          - "Enquetes em dia de jogo (Quem leva a vitoria?)"
          - "Reacoes a lancamento de camisas"
          - "Noticias importantes do futebol (SO as importantes)"
        objetivo: "Medir engajamento dos leads (60-70 reacoes em 10 min)"

      tipo_2_consciencia:
        nome: "Elevar Nivel de Consciencia"
        exemplos:
          - "UGC/GC de clientes recebendo produto"
          - "Videos de influenciadores"
        efeito: "Quebra 2 das 3 objecoes: qualidade + confianca"
        frequencia: "1 a cada 2 dias ou 1 por semana"

      tipo_3_oferta:
        nome: "Oferta/Desconto"
        exemplos:
          - "Cupom"
          - "Desconto progressivo"
          - "Parcelamento sem juros"
          - "Hack dia fraco: Hoje personalizacao gratuita em todos os produtos"
        frequencia: "1x por semana ou de 15 em 15 dias MAXIMO"
        regra: "Se so manda cupom, ninguem fica"

    resultados:
      black_friday: "R$12-15K em 30 minutos"
      percentual_faturamento: "10-15% do faturamento total"

    lancamento_contagem_regressiva:
      passos:
        - "Dia 15: imagem 'faltam 15 dias' + video UGC"
        - "Dia 14: imagem 'faltam 14 dias' + mensagem de engajamento"
        - "Continuar ate o dia do lancamento"
        - "No dia: soltar oferta agressiva"
      resultado: "R$40k no dia (com trafego + outros canais)"

  zapvoice:
    descricao: "Audios pre-gravados para equipe de suporte/vendas"
    custo: "~R$50/mes (serve 2-3 colaboradores)"
    funcionalidade: "Gravar audios com rosto da marca para todas situacoes comuns"
    beneficio: "Equipe responde com 1 clique em 5 segundos vs 5 minutos"
    objetivo: "Reduzir 80% do trabalho operacional"

  regras_decisao:
    - "3 momentos mais quentes do funil: pedido pago (CTA comunidade), pedido postado (CTA app), compra entregue (CTA afiliados)"
    - "Comunidade so cupom NAO funciona. Precisa dos 3 tipos de mensagem"
    - "Ninguem esta em grupo de WhatsApp pra receber cupom toda hora"

