# =============================================================================
# RECUPERACAO DE CARRINHO ABANDONADO
# =============================================================================
recuperacao_carrinho:
  taxa_recuperacao_ivan: "31% media (todos clientes CDR Labs)"
  taxa_recuperacao_mercado: "10-15%"
  resultado_mensal: "R$155K em vendas recuperadas em um mes"
  carrinhos_abandonados_mes: "R$454K total de carrinhos abandonados dos clientes"
  janela_funil: "30 dias (testou 60 e 90 dias; conversao muito baixa apos 30)"
  carrinho_como_percentual: "95% de toda recuperacao vem de carrinho abandonado"
  case_evolucao: "Cliente saiu de 2% para 16-17% de recuperacao"

  sequencia_4_mensagens:
    descricao: "Funil de Recuperacao em 4 Contatos - cliente normalmente compra entre 2a e 4a mensagem"
    dia_1_chamar_atencao:
      mensagem: "Ola, esse numero e do [Nome]?"
      origem: "Insight da Morgana Kaiser no evento Drophouse (Fernando Pintos)"
      por_que_funciona: "Gera curiosidade - O que essa pessoa quer comigo? Sera importante?"
      resultado: "Taxa de resposta muito alta"
      aplicacao: "Usar em QUALQUER tipo de lead (carrinho, PIX, cartao recusado)"
    dia_2_facilitacao:
      acoes:
        - "Suporte ativo"
        - "Passar confianca"
        - "Facilitar pagamento (ex: 3x sem juros)"
    dia_3_identificacao_objecao:
      acoes:
        - "Entender POR QUE nao comprou"
        - "Contornar objecao especifica"
    dia_4_oferta_irresistivel:
      acoes:
        - "Brinde (chaveiro - custaria R$30 mas mando gratis)"
        - "Cupom 5-15% (usar com criterio)"
        - "Encerramento com CTA claro: Posso te ajudar a finalizar agora com esse cupom?"

  regras_criticas:
    - "NUNCA usar ChatGPT para scripts de venda - mensagens robotizadas nao convertem"
    - "Cupom NAO na primeira mensagem - primeiro identificar objecao; as vezes nao e preco"
    - "Tempo de resposta < 20 minutos - lead esfria rapido"
    - "Lead quente = prioridade - quanto menos tempo desde o carrinho, mais quente"
    - "Constancia: bater no mesmo lead varias vezes (4 contatos)"
    - "Carrinho > PIX > Cartao > Boleto em ordem de potencial de recuperacao"

  imagem_email_carrinho:
    regra: "Usar imagem de produto INTERNACIONAL (nao pode mandar camisa do Corinthians para palmeirense)"
    motivo: "Automacao nao sabe qual time o lead torce"

# =============================================================================
# RECUPERACAO X1 WHATSAPP (EQUIPE COMERCIAL)
# =============================================================================
recuperacao_x1:
  descricao: "Estrutura X1 de Recuperacao via WhatsApp"
  resultado_historico: "~R$3.000.000 recuperados com ~R$300.000 investidos (ROAS ~10x)"
  investimento_operacao: "8-10% do valor recuperado"
  receita_recuperada_max: "20% da receita paga pode vir de recuperacao X1"
  taxa_pagamento_com_todas_automacoes: "90%"
  lucro_bruto_50_margem: "R$1.500.000 do total recuperado"
  lucro_liquido_pos_custos: "R$1.375.000"
  exemplo_rapido: "R$176K em 15 dias em uma operacao"

  tipos_lead_perdido:
    - tipo: "Carrinho abandonado"
      percentual: "95% da recuperacao"
    - tipo: "PIX nao pago"
    - tipo: "Boleto nao pago"
    - tipo: "Cartao recusado"
    - tipo: "Chargeback"

  contorno_objecoes:
    principais:
      - objecao: "Ta caro"
        contorno: "Uma oficial custa R$700, aqui ta R$250, e a qualidade e a mesma"
      - objecao: "Medo de golpe/confianca"
        contorno: "Mandar CNPJ, endereco, tempo de abertura, Instagram, Google Maps, foto/video da loja"
      - objecao: "Nao entende a promocao"
        contorno: "Pague 2 Leve 3 confunde muita gente; explicar claramente"
      - objecao: "Qualidade do produto"
        contorno: "Enviar fotos/videos detalhados"
    regra_geral: "Humanizar ao maximo (audio, foto, video). Pessoas confiam em pessoas."

  estrategia_confianca:
    elementos:
      - "CNPJ registrado"
      - "Endereco da empresa"
      - "Tempo de abertura"
      - "Link do Instagram com muitos seguidores"
      - "Localizacao Google Maps (se loja fisica)"
      - "Foto/video da loja"
      - "Reclame Aqui positivo"
      - "Avaliacoes de clientes"

  estrategia_humanizacao:
    elementos:
      - "Mandar audio ao inves de texto"
      - "Mandar foto e video"
      - "Ter um rosto na rede social (influencer, colaborador)"
      - "Compartilhar redes sociais (quanto mais, melhor)"
      - "YouTube fortalece muito a confianca"

  recuperacao_chargeback:
    nome: "Notificacao Extrajudicial (estrategia agressiva)"
    passos:
      - "Ter um numero simulando contato com advogada"
      - "Mandar notificacao extrajudicial (formatada como oficial)"
      - "Informar que pedido esta em transito, se quiser solicitar chargeback, aguardar recebimento"
      - "Pedir que realize pagamento novamente"

  equipe:
    regra: "Treinar equipe do zero e preferivel a contratar especialista caro"
    motivo: "Pessoa sem vicios de venda e mais barata e moldavel"

# =============================================================================
# REPORTANA
# =============================================================================
reportana:
  descricao: "Plataforma principal de automacao e-mail + WhatsApp"
  custo: "R$159/mes"
  posicionamento: "Melhor custo-beneficio do mercado"
  servidor: "Compartilhado (limita taxa de entrega)"

  funcionalidades:
    - "Automacoes de e-mail e WhatsApp"
    - "Listas segmentadas por clube (automatica e retroativa)"
    - "Disparos nichados por clube"
    - "Teste A/B de automacoes (funcao Randomizar - 50%/50%)"
    - "Import/Export de automacoes entre lojas"
    - "Matriz RFM (segmenta leads de 0 a 10 por potencial)"
    - "API oficial WhatsApp integrada"
    - "Metricas de receita por contato"
    - "Integracao nativa Shopify"
    - "UTM por campanha para rastreio"

  vs_klaviyo:
    reportana: "R$159/mes, servidor compartilhado, bom custo-beneficio"
    klaviyo: "R$300-500+/mes, servidor proprio por loja, segmentacao avancada (mostra produtos visualizados)"
    regra_decisao: "Ate R$100K/mes -> Reportana. Acima -> Klaviyo (e-mail) + Reportana (WhatsApp)"

  vs_cellflux:
    reportana: "Integracao nativa Shopify, metricas de receita por contato, segmentacao por lista"
    cellflux: "Boa para infoprodutores, integracao Shopify custou R$4.400 + bugs"

  matriz_rfm:
    descricao: "Segmenta leads de 0 a 10 baseado no potencial"
    lead_8_10: "Comprou varias vezes, gastou muito -> muito mais facil converter"
    lead_0_1_2: "Campanhas especificas para reativar"
    ivan_quote: "E ouro na mao de quem sabe utilizar"

# =============================================================================
# SEXY CANVAS (METODOLOGIA DE COPY)
# =============================================================================
sexy_canvas:
  nome: "Metodologia Sexy Canvas"
  autor: "Andre Diamant (tambem referenciado como Andre Djalman)"
  conceito: "Usar os 7 pecados capitais para persuadir o cliente"

  implementacao_com_ia:
    passos:
      - "Criar projeto no Claude (ou ChatGPT) chamado 'Andre Diamant'"
      - "Fazer upload dos livros do Andre Diamant (PDFs)"
      - "Dar instrucoes em texto sobre como o projeto deve responder"
      - "Pedir para otimizar e-mails ou criar novos seguindo a metodologia"
    prompt_exemplo: "Andre, amanha dia X tenho disparo de e-mail para toda a base sobre Dia dos Pais. Utilize metodologia Sexy Canvas, siga padroes Nike/Adidas, crie o melhor e-mail possivel para conversao maxima."
    resultado: "IA gera banners sugeridos, copy, cabecalho, estrutura completa"

  uso_em_automacoes:
    descricao: "Aplicar Sexy Canvas + gatilho de curiosidade nas automacoes"
    resultado_taxa_abertura: "40% vs media mercado 15%"
    resultado_metricas: "R$16/disparo e R$65/click de retorno"

# =============================================================================
# FLUXOS DE EMAIL
# =============================================================================
email_flows:
  evolucao_v1_v2:
    fase_1_v1:
      nome: "E-mail Esqueleto (primeiros 2-3 meses)"
      caracteristicas:
        - "E-mail basico: apenas copy, CTA, botao e logo"
        - "Imagens em JPEG (mais leves que PNG)"
        - "Pouco negrito, pouco maiusculo (evita spam)"
      objetivo: "Construir reputacao do dominio com a plataforma"

    fase_2_v2:
      nome: "E-mail Profissional (apos reputacao construida)"
      caracteristicas:
        - "80% imagem, 20% escrita"
        - "Modelando Nike/Adidas"
        - "Fotos de produtos, sessoes de confianca, multiplos CTAs"
      regra_transicao: "Se taxa de abertura nao cair de forma grotesca ao migrar, dominio esta pronto"

  estrutura_email_profissional_v2:
    passos:
      - "Banner/imagem de cabecalho (alinhado com oferta)"
      - "Heading (fonte Helvetica, 28px, bold, maiusculo)"
      - "Copy curta (Helvetica, 16px, pouco negrito)"
      - "Botao CTA #1 (fundo preto, fonte branca, sem borda arredondada, alinhado a esquerda)"
      - "Sessao de 2 colunas: foto produto + copy de qualidade (alternando lados)"
      - "Botao CTA #2 (borda preta, fundo branco - variacao visual)"
      - "Repetir sessao 2 colunas (3 vezes alternando)"
      - "Sessao de produtos recomendados (2 colunas com foto, titulo, preco, parcelamento, botao)"
      - "Botao 'Ver todas as camisas'"
      - "Rodape: logo + redes sociais (Instagram, YouTube, TikTok) + CNPJ"
    fonte: "Helvetica"
    tamanho_texto: "16px"
    tamanho_cabecalho: "28px"
    botoes: "Quadrados (sem borda arredondada) - passa sofisticacao no subconsciente"
    referencia: "Modelar Nike e Adidas"

  assuntos_que_convertem:
    exemplos:
      - assunto: "Comece da melhor forma, [Nome]"
        contexto: "Com cupom 5% no dia 1 do mes"
        resultado: "R$3K conversao"
      - assunto: "O mundo vai parar"
        contexto: "Sobre semifinal"
        resultado: "84% taxa abertura"
      - assunto: "As mais desejadas do momento"
        contexto: "Com emoji sugestivo para publico masculino"
    regras_assunto:
      - "Sempre usar pelo menos 1 emoji no assunto (max 2)"
      - "Emojis no assunto aumentam 42-50% taxa abertura (pesquisa Gemini, fonte gringa)"
      - "Gatilho de curiosidade e o mais eficaz"

  frequencia_disparo: "2-3x por semana (normal: 2; sazonalidade: 3)"
  taxa_desinscricao: "0.10% (abaixo de 1% e bom)"

  regras_links:
    multiplos_clubes: "Link para COLECAO"
    nichado_1_clube: "Link para PRODUTO"

  regras_spam:
    - "Muito negrito/maiusculo aumenta chance de cair no spam"
    - "Imagens em JPEG (mais leves que PNG)"
    - "Comecar com V1 basico para construir reputacao"

  funil_reverso:
    descricao: "Entrar no funil reverso de grandes marcas"
    como_fazer: "Gerar um PIX na Nike, abandonar carrinho na Adidas, para entender os e-mails deles"

# =============================================================================
# AUTOMACOES POR EVENTO
# =============================================================================
automacoes_por_evento:
  pedido_pago:
    janela: "3 dias"
    acao: "Upsell com 15-20% desconto"
    logica: "CPA ja foi pago, pode ser mais agressivo"
    cta_adicional: "Convite para comunidade WhatsApp"

  pix_gerado_vencido:
    janela: "5 dias"
    acao: "Oferta de desconto adicional (5%+) alem do desconto do PIX"
    objecao_principal: "Preco"
    diferencial: "90% das lojas so tem automacao padrao de PIX (lembrete). Poucas fazem CTA apos PIX vencido."

  cartao_recusado:
    janela: "3 dias"
    acao: "Oferecer pagamento via PIX"
    motivo: "NAO e cartao sem limite; e quando plataforma identifica possivel fraude"
    vantagem_pix: "PIX nao tem como destornar (elimina risco de chargeback)"

  carrinho_abandonado:
    janela: "30 dias"
    objecao: "Pode ser qualquer das 3 (preco, qualidade, confianca) -> sequencia para identificar"
    resultado_2o_contato: "R$53/envio, R$533/clique"

  rastreio:
    eventos:
      - "Pedido postado (CTA: baixar app)"
      - "Saiu para entrega"
      - "Falha na entrega"
      - "Pedido entregue (CTA: programa afiliados)"

  remarketing_pos_entrega:
    janela: "90-120 dias"
    conceito: "Baseado no tempo medio de recompra dos clientes recorrentes"
    passos:
      - "Identificar media de tempo para segunda/terceira compra"
      - "Criar funil de automacao com essa duracao"
      - "Enviar mensagens periodicas tentando reativar"
      - "Oferecer desconto na automacao de pedido entregue"
    em_desenvolvimento: "Mostrar no e-mail produtos que o cliente visualizou (nao nativo da Reportana; Klaviyo ja tem)"

  automacao_sms:
    evento: "PIX gerado"
    acao: "SMS logo apos PIX ser gerado"
    conteudo: "Reforcar pagamento + informar codigo PIX copiavel"
    complemento: "Automacoes de e-mail e WhatsApp"

