  coutimer: "App de contador regressivo para Shopify"
  fabrica_local: "Para produto isca (poster, adesivo) - envio como carta"
  capcut: "Edicao de video para criativos sazonais"
  disparo_extensao: "Pesquisa de mercado - ver criativos mais escalados (gratuita)"
  ia_fotos: "Gerar fotos de modelos vestindo produtos (qualidade ja profissional)"

